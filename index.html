<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ptrjstn</title>
    <meta
      name="description"
      content="Zentrale Website für Peter Justen: Landingpage, Kinderbücher und Portfolio in einem Repo."
    />
    <meta name="robots" content="noindex, nofollow" />
    <script>
      (() => {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

        try {
          const storedTheme = window.localStorage.getItem("theme");
          const theme = storedTheme === "dark" || storedTheme === "light" ? storedTheme : (prefersDark ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          const theme = prefersDark ? "dark" : "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        }
      })();
    </script>
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-hQ3kjDb9KU1cXZu8uwK2e.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="landing.css" />
    <script defer src="landing.js"></script>
    <script defer src="theme.js"></script>
  </head>
  <body>
    <main class="wrap portfolio-wrap landing-wrap" aria-label="Einleitung">
      <header class="portfolio-hero" aria-label="Kopfbereich">
        <a class="site-title" href="./" aria-label="Startseite">
          <img src="assets/shared/logo.png" alt="ptrjstn" width="226" height="98" />
        </a>

        <nav class="portfolio-nav" aria-label="Navigation">
          <a href="Portfolio/">Work</a>
        </nav>
      </header>

      <section class="landing" aria-label="Grafische Wortmarke ptrjstn">
        <div class="landing__content">
          <div class="lettermark">
            <button class="lettermark__letter" type="button" data-letter="P" aria-label="Buchstabe P austauschen"><img alt="" /></button>
            <button class="lettermark__letter" type="button" data-letter="T" aria-label="Buchstabe T austauschen"><img alt="" /></button>
            <button class="lettermark__letter" type="button" data-letter="R" aria-label="Buchstabe R austauschen"><img alt="" /></button>
            <button class="lettermark__letter" type="button" data-letter="J" aria-label="Buchstabe J austauschen"><img alt="" /></button>
            <button class="lettermark__letter" type="button" data-letter="S" aria-label="Buchstabe S austauschen"><img alt="" /></button>
            <button class="lettermark__letter" type="button" data-letter="T" aria-label="Buchstabe T austauschen"><img alt="" /></button>
            <button class="lettermark__letter" type="button" data-letter="N" aria-label="Buchstabe N austauschen"><img alt="" /></button>
          </div>
          <button class="neologism-button" type="button" data-neologism-open>Neologism</button>
        </div>
      </section>

      <dialog class="neologism-dialog" aria-labelledby="neologism-title">
        <div class="neologism-dialog__inner">
          <button class="neologism-dialog__close" type="button" aria-label="Popup schließen" data-neologism-close>×</button>
          <p class="neologism-dialog__eyebrow">Neologism</p>
          <div class="neologism-dialog__status" role="status" aria-live="polite" data-neologism-status></div>
          <div class="neologism-dialog__result" data-neologism-result hidden>
            <h2 id="neologism-title" class="neologism-dialog__word" data-neologism-word></h2>
            <p class="neologism-dialog__type" data-neologism-type></p>
            <p class="neologism-dialog__definition" data-neologism-definition></p>
          </div>
        </div>
      </dialog>

      <div class="footer-divider" aria-hidden="true"></div>
      <footer class="foot"><span class="muted">© 2026</span></footer>
    </main>
  </body>
</html>
