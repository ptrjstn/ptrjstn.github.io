<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wortpfad</title>
    <meta name="description" content="Finde den kürzesten semantischen Pfad zwischen zwei Wörtern." />
    <meta name="robots" content="noindex, nofollow" />
    <script>
      (() => {
        const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        try { document.documentElement.dataset.theme = localStorage.getItem("theme") || (dark ? "dark" : "light"); }
        catch { document.documentElement.dataset.theme = dark ? "dark" : "light"; }
      })();
    </script>
    <link rel="stylesheet" href="../global.css?v=20260721-1" />
    <link rel="stylesheet" href="styles.css?v=20260721-1" />
    <script defer src="game.js?v=20260721-1"></script>
    <script defer src="../theme.js"></script>
  </head>
  <body>
    <main class="wrap portfolio-wrap fun-wrap">
      <header class="portfolio-hero" aria-label="Kopfbereich">
        <a class="site-title" href="../" aria-label="Startseite"><img src="../assets/shared/logo.png" alt="ptrjstn" width="226" height="98" /></a>
        <nav class="portfolio-nav" aria-label="Navigation"><a href="../Portfolio/">Work</a><a href="../About/">About</a></nav>
      </header>

      <section class="game" aria-label="Wortpfad">
        <div class="game__topline"><span>Wortpfad</span><span data-date></span></div>
        <div class="stats" aria-label="Spielstand"><span><b data-steps>0</b> Schritte</span><span><b data-time>0:00</b></span></div>
        <div class="path" data-path aria-live="polite"></div>
        <form class="guess-form" data-guess-form>
          <label class="sr-only" for="guess">Nächstes Wort</label>
          <input id="guess" name="guess" type="text" inputmode="text" autocomplete="off" autocapitalize="words" spellcheck="false" maxlength="40" placeholder="Nächstes Wort" required />
          <button type="submit" aria-label="Wort prüfen" title="Wort prüfen">→</button>
        </form>
        <p class="game__message" data-message role="status" aria-live="polite"></p>
        <section class="result" data-result hidden aria-live="polite">
          <p class="result__eyebrow">Geschafft</p>
          <h1><span data-final-steps></span> Schritte</h1>
          <p><span data-final-time></span> · besser als <span data-percentile></span> der heutigen Spieler</p>
        </section>
      </section>
      <div class="footer-divider" aria-hidden="true"></div>
      <footer class="foot"><span class="muted">© 2026</span></footer>
    </main>
  </body>
</html>
