<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>About – ptrjstn</title>
    <meta name="description" content="Über Peter, Copywriter und Konzeptioner aus Tübingen." />
    <script>
      (() => {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

        try {
          const storedTheme = window.localStorage.getItem("theme");
          const theme = storedTheme === "dark" || storedTheme === "light" ? storedTheme : (prefersDark ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          const theme = prefersDark ? "dark" : "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        }
      })();
    </script>
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-hQ3kjDb9KU1cXZu8uwK2e.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};

    </script>
    <link rel="stylesheet" href="../global.css?v=20260720-3" />
    <link rel="stylesheet" href="styles.css?v=20260720-6" />

    <script defer src="../theme.js"></script>
  </head>
  <body>
    <main class="wrap portfolio-wrap about-wrap">
      <header class="portfolio-hero" aria-label="Kopfbereich">
        <a class="site-title" href="../" aria-label="Startseite">
          <img src="../assets/shared/logo.png" alt="ptrjstn" width="226" height="98" />
        </a>
        <nav class="portfolio-nav" aria-label="Navigation">
          <a href="../Portfolio/">Work</a>
          <a href="./" aria-current="page">About</a>
        </nav>
      </header>

      <section class="about" aria-labelledby="about-title">
        <figure class="about__portrait" data-about-portrait>
          <div class="about__portrait-frame" role="button" tabindex="0" aria-label="Neue KI-Overlays erzeugen" title="Neue Overlays erzeugen" data-about-portrait-trigger>
            <img class="about__portrait-original" src="../assets/about/peter.webp" alt="Porträt von Peter" width="1000" height="1500" />
            <div class="about__art" data-about-art aria-hidden="true"></div>
          </div>
        </figure>

        <div class="about__copy">
          <div class="about__title-row">
            <h1 id="about-title">About</h1>
            <button class="about__reload" type="button" aria-label="About-Text neu generieren" title="Text neu generieren" data-about-reload>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 7h-5V2" />
                <path d="M4 17h5v5" />
                <path d="M5.1 9A7 7 0 0 1 17 5l3 2" />
                <path d="M18.9 15A7 7 0 0 1 7 19l-3-2" />
              </svg>
            </button>
          </div>
          <div class="about__text" role="status" aria-live="polite" data-about-text data-state="loading">
            <span class="loading-dot" aria-hidden="true">•</span>
            <span class="loading-dot" aria-hidden="true">•</span>
            <span class="loading-dot" aria-hidden="true">•</span>
            <span class="sr-only">Text wird von der KI geschrieben.</span>
          </div>
          <p class="about__note">Dieser Text wird bei jedem Besuch von einer KI neu formuliert.</p>
        </div>
      </section>

      <div class="footer-divider" aria-hidden="true"></div>
      <footer class="foot"><span class="muted">© 2026</span></footer>
    </main>
  </body>
</html>
