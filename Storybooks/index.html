<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kinderbücher</title>
    <link rel="canonical" href="https://ptrjstn.de/Storybooks/" />
    <meta name="robots" content="noindex, nofollow" />
    <script>
      (() => {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

        try {
          const storedTheme = window.localStorage.getItem("theme");
          const theme = storedTheme === "dark" || storedTheme === "light" ? storedTheme : (prefersDark ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          const theme = prefersDark ? "dark" : "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        }
      })();
    </script>
    <link rel="stylesheet" href="../global.css" />
    <script defer src="../theme.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap portfolio-wrap" aria-label="Kinderbücher">
      <header class="portfolio-hero">
        <a class="site-title" href="../" aria-label="Startseite">
          <img src="../assets/shared/logo.png" width="226" height="98" alt="ptrjstn" decoding="async" fetchpriority="high" />
        </a>
        <nav class="portfolio-nav" aria-label="Website">
          <span aria-current="page">Kinderbücher</span>
          <a href="../Portfolio/">Portfolio</a>
        </nav>
      </header>

      <section class="book-library" aria-label="Bücher">
        <a class="book-card book-card--single" href="buch-01/" data-book="buch-01">
          <img src="buch-01/MUT/MUT1.png" alt="Cover von Alles, was dich weiterbringt" loading="eager" decoding="async" fetchpriority="high" />
        </a>
      </section>

      <div class="footer-divider" aria-hidden="true"></div>
      <footer class="foot"><span class="muted">© 2026</span></footer>
    </main>
  </body>
</html>
